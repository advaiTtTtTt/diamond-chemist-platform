<!DOCTYPE html>
<html>
<body>
  <textarea id="sql" style="display:none;"></textarea>
  <button id="copyBtn">Copy SQL</button>
  <script>
    fetch('sync_products.sql')
      .then(res => res.text())
      .then(text => {
        document.getElementById('sql').value = text;
      });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const text = document.getElementById('sql').value;
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copyBtn').innerText = 'Copied!';
      });
    });
  </script>
</body>
</html>
